[project]
name = "dataknobs-common"
version = "1.5.1"
description = "Common utilities and base classes for dataknobs packages"
readme = "README.md"
authors = [
    { name = "Spence Koehler", email = "KoehlerSB747@gmail.com" }
]
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
# Optional ``.env`` / ``.project_vars`` fallback layer for
# ``normalize_postgres_connection_config``. Absent this extra the
# dotenv layer is silently skipped (os.environ + config still work),
# so it stays opt-in to keep the base install lean.
dotenv = ["python-dotenv>=1.0.0"]
# PostgreSQL LISTEN/NOTIFY EventBus (``PostgresEventBus`` / the
# ``"postgres"`` backend). asyncpg is lazy-imported inside the backend
# and its registry wrapper, so the base install stays
# ``dependencies = []``.
postgres = ["asyncpg>=0.29.0"]
# The ``redis`` driver, used by the Redis pub/sub EventBus
# (``RedisEventBus`` / the ``"redis"`` backend) and the pyrate
# Redis-bucket rate limiter. Lazy-imported at each use site, so the
# base install stays ``dependencies = []``.
redis = ["redis>=5.0.0"]
# Async AWS transport for the shared session factory
# (``dataknobs_common.aws.create_aioboto3_session``), used by every AWS
# consumer: SqsEventBus and the S3 data backends today, and future AWS
# services (e.g. a bedrock-runtime LLM provider). aioboto3 is
# lazy-imported inside the factory's worker thread, so the base install
# stays ``dependencies = []`` and importing ``dataknobs_common.aws``
# never requires it.
aws = ["aioboto3>=12.0.0"]
# AWS SQS-backed EventBus (``SqsEventBus`` / the ``"sqs"`` backend).
# Lazy-imported inside the backend and its registry wrapper, so the
# base install stays ``dependencies = []`` and importing
# ``dataknobs_common.events`` never requires aioboto3. SqsEventBus routes
# through the shared session factory, so this composes the ``aws``
# transport extra rather than re-pinning aioboto3 (single source of the
# version floor).
sqs = ["dataknobs-common[aws]"]

[project.entry-points.pytest11]
dataknobs_common_postgres = "dataknobs_common.testing.postgres_fixtures"
dataknobs_common_elasticsearch = "dataknobs_common.testing.elasticsearch_fixtures"
dataknobs_common_localstack = "dataknobs_common.testing.localstack_fixtures"
dataknobs_common_blocking = "dataknobs_common.testing.blocking"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "pytest-benchmark>=4.0.0",
    "ruff>=0.8.0",
    "mypy>=1.0.0",
    # v4-only API surface (SQLiteBucket.init_from_file, RedisBucket.init,
    # the v4 try_acquire(blocking=False) contract). Floored at 4 so a
    # resolution can't drop to the incompatible v3 API; capped below 5
    # so a future major can't silently break the tested surface.
    "pyrate-limiter>=4.0.0,<5.0.0",
    "asyncpg>=0.29.0",
    "redis>=5.0.0",
    "aioboto3>=12.0.0",
    # Runtime blocking-call detector for async-correctness tests
    # (dataknobs_common.testing.assert_no_blocking). Dev/test-only —
    # never imported by shipped runtime code.
    "blockbuster>=1.5.26,<2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_common"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = []
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src/dataknobs_common"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
warn_no_return = false
warn_unreachable = false
strict_equality = true

# numpy >= 2.5 ships stubs using PEP 695 `type` statements (3.12+ syntax);
# with python_version = "3.10" mypy aborts on the present stub. Skip following
# into numpy's stubs (treat as Any) — we do not type-check against its API.
[[tool.mypy.overrides]]
module = "numpy.*"
ignore_missing_imports = true
follow_imports = "skip"
follow_imports_for_stubs = true

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
    "ASYNC",  # flake8-async - async code must not block the event loop
]

ignore = [
    "D100", # Missing docstring in public module
    "D101", # Missing docstring in public class
    "D102", # Missing docstring in public method
    "D103", # Missing docstring in public function
    "D104", # Missing docstring in public package
    "D105", # Missing docstring in magic method
    "D107", # Missing docstring in __init__
    "D203", # 1 blank line required before class docstring
    "D205", # 1 blank line required between summary line and description
    "D213", # Multi-line docstring summary should start at the second line
    "D400", # First line should end with a period
    "D401", # First line should be in imperative mood
    "D404", # First word of the docstring should not be "This"
    "B905", # zip() without an explicit strict parameter
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["D104", "F401"]
"tests/*" = ["D100", "D101", "D102", "D103", "S101"]

[tool.ruff.lint.isort]
known-first-party = [
    "dataknobs_common",
]

[tool.ruff.lint.pydocstyle]
convention = "google"
