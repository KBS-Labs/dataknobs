[project]
name = "dataknobs-fsm"
version = "0.3.0"
description = "Finite State Machine framework with data modes, resource management, and streaming support"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    {name = "DataKnobs Team", email = "team@dataknobs.com"}
]
keywords = ["fsm", "state-machine", "workflow", "orchestration", "data-processing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "pydantic>=2.0.0",
    "dataknobs-common>=1.6.1",
    "dataknobs-data>=0.6.1",
    "dataknobs-structures>=1.0.13",
    "dataknobs-utils>=1.2.16",
    "dataknobs-config>=0.4.2",
    "aiofiles>=23.0.0",
    "click>=8.3.3",  # PYSEC-2026-2132 / CVE-2026-7246 (CVSS 7.2, command injection via click.edit()) fixed in 8.3.3
    "rich>=13.0.0",
    "pyyaml>=6.0.2",  # 6.0 lacks cp312/cp313 wheels and source build fails on Cython 3
    "ijson>=3.2.0",
]

[project.optional-dependencies]
llm = [
    "openai>=1.0.0",
    "anthropic>=0.7.0",
    "langchain>=1.3.9",  # multiple langchain/langchain-core/langchain-community CVEs (highest CVSS 9.3: GHSA-c67j-w6g6-q2cm) fixed by the langchain 1.x line; GHSA-gr75-jv2w-4656 (CVSS 5.1) still affects 1.0.0–1.3.8 and is fixed in 1.3.9. We only declare this as a convenience extra and do not import it
]
http = [
    "httpx>=0.27.0",  # GHSA-vqfr-h8mv-ghfj in transitive h11<0.16 (CVSS 9.1) swept by httpcore 1.x (required by httpx>=0.27)
    "aiohttp>=3.14.1",  # extends the prior <=3.13.3 sweep (highest CVSS 9.1: GHSA-63hf-3vf5-4wqf) through 3.14.x. Adds GHSA-hg6j-4rv6-33pg (CVSS 6.6, per-request cookies= cross-origin leak), GHSA-jg22-mg44-37j8 (CVSS 6.4, CookieJar.load() deserialization), and the rest of the <3.14.x sweep landing across 3.14.0 / 3.14.1. The two named highs were triaged unreachable from this codebase (outbound HTTP uses header-based auth; CookieJar.load() is not invoked) but bumping clears the floor-resolve audit regardless. Unblocked by the workspace move off aioresponses to an in-process aiohttp.web test server.
]
vector = [
    "pgvector>=0.2.0",
    "faiss-cpu>=1.7.4",
    "chromadb>=1.0.0",  # ChromaVectorStore targets the 1.x API. GHSA-f4j7-r4q5-qw2c/PYSEC-2026-311 (CVSS 9.3, pre-auth code injection via /api/v2/... endpoint) affects 1.0.0–1.5.9 with no upstream fix as of 2026-07-06 — not exposed via the dataknobs-data ChromaVectorStore client (embedded/persistent modes only)
]
all = [
    "dataknobs-fsm[llm,http,vector]",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.11.0",
    "black>=26.3.1",  # PYSEC-2024-48, GHSA-3936-cmfr-pm3m (CVSS 8.7) fixed by 26.3.1
    "ruff>=0.8.0",
    "mypy>=1.0.0",
    "mkdocs>=1.5.0",
    "mkdocs-material>=9.0.0",
    "markdown>=3.8.1",  # GHSA-5wmx-573v-2qwq (XSS, CVSS 7.5) fixed in 3.8.1 — transitive via mkdocs-material; explicit floor required
    "pymdown-extensions>=10.21.3",  # GHSA-62q4-447f-wv8h (CVSS 4.3) fixed in 10.21.3; also sweeps GHSA-r6h4-mm7h-8pmq (CVSS 2.7, 10.16.1) — transitive via mkdocs-material; explicit floor required
]

[project.scripts]
fsm = "dataknobs_fsm.cli:main"

[project.urls]
"Homepage" = "https://github.com/dataknobs/dataknobs"
"Bug Tracker" = "https://github.com/dataknobs/dataknobs/issues"
"Documentation" = "https://dataknobs.readthedocs.io"

[tool.uv.sources]
dataknobs-data = { workspace = true }
dataknobs-structures = { workspace = true }
dataknobs-utils = { workspace = true }
dataknobs-config = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest-asyncio>=1.1.0",
    "pytest-cov>=6.2.1",
    "ruff>=0.8.0",
    "mkdocs>=1.5.0",
    "mkdocs-material>=9.0.0",
    # blockbuster powers the reproduce-first async-blocking assertions
    # (assert_no_blocking from dataknobs-common) used by the file-processing
    # and streaming-file utility offload tests. Without it installed here
    # those assertions would skip instead of proving the readers/writers
    # keep the loop unblocked. Dev/test-only — never imported by shipped
    # runtime code.
    "blockbuster>=1.5.26,<2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_fsm"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = []
asyncio_mode = "auto"
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "slow: marks tests as slow running",
    "database: marks tests that require database",
    "llm: marks tests that require LLM services",
    "streaming: marks tests for streaming functionality",
]

[tool.coverage.run]
source = ["src/dataknobs_fsm"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "pandas.*",
    "openai.*",
    "anthropic.*",
    "langchain.*",
    "httpx.*",
    "aiohttp.*",
    "chromadb.*",
    "faiss.*",
]
ignore_missing_imports = true

# numpy >= 2.5 ships stubs using PEP 695 `type` statements (3.12+ syntax);
# with python_version = "3.10" mypy aborts on the present stub. Skip following
# into numpy's stubs (treat as Any) — we do not type-check against its API.
[[tool.mypy.overrides]]
module = "numpy.*"
ignore_missing_imports = true
follow_imports = "skip"
follow_imports_for_stubs = true

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "D",    # pydocstyle
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # Ruff-specific rules
    "ASYNC",  # flake8-async - async code must not block the event loop
]

ignore = [
    "D100", # Missing docstring in public module
    "D104", # Missing docstring in public package
    "D203", # 1 blank line required before class docstring
    "D213", # Multi-line docstring summary should start at the second line
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["D104", "F401"]
"tests/*" = ["D100", "D101", "D102", "D103", "S101"]
# Cheap one-shot path stat at validate()-time; setup-time, not a hot-loop call.
"src/dataknobs_fsm/io/adapters.py" = ["ASYNC240"]

[tool.ruff.lint.isort]
known-first-party = ["dataknobs_fsm", "dataknobs_data", "dataknobs_structures", "dataknobs_utils", "dataknobs_config"]

[tool.ruff.lint.pydocstyle]
convention = "google"
