[project]
name = "dataknobs-bots"
version = "0.6.22"
description = "Configuration-driven AI agents for DataKnobs"
readme = "README.md"
authors = [
    { name = "Spence Koehler", email = "KoehlerSB747@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "dataknobs-common>=1.3.14",
    "dataknobs-config>=0.3.14",
    "dataknobs-llm>=0.5.14",
    "dataknobs-data>=0.4.20",
    "dataknobs-utils>=1.2.12",
    "dataknobs-xization>=1.3.7",
    "dataknobs-fsm>=0.1.21",
    "pyyaml>=6.0.2",  # 6.0 lacks cp312/cp313 wheels and source build fails on Cython 3
    "numpy>=1.24.0",
    "jinja2>=3.1.6",  # GHSA-cpwx-vrp4-4pq7, GHSA-gmj6-6f8f-6699, GHSA-h75v-3vvj-5mfj, GHSA-q2x7-8rv6-6q7h fixed by 3.1.6
    # jsonschema is lazy-imported by generators/base.py,
    # rubrics/executor.py and review/executor.py for parameter and
    # output schema validation.  Declaring it here keeps the runtime
    # import from raising ModuleNotFoundError in consumer envs.
    "jsonschema>=4.0.0",
]

[project.optional-dependencies]
s3 = [
    "boto3>=1.26.0",
]
# `dataknobs-bots[server]` brings in FastAPI for the reference
# `create_registry_router` HTTP server in `registry.server`.  The
# module lazy-imports FastAPI so the package still imports cleanly
# when the extra is not installed; callers that actually invoke
# `create_registry_router` must install this extra.
server = [
    # fastapi>=0.120.1 is the lowest fastapi whose starlette
    # constraint (starlette<0.50.0,>=0.40.0) permits the patched
    # starlette pinned below; fastapi 0.110.0 capped starlette<0.37.0.
    "fastapi>=0.120.1",
    "starlette>=0.49.1",  # GHSA-7f5h-v6xp-fcq8 (CVSS 7.5), GHSA-2c2j-9gv5-cj73 (CVSS 5.3) fixed in 0.49.1
]

[tool.uv.sources]
dataknobs-common = { workspace = true }
dataknobs-config = { workspace = true }
dataknobs-llm = { workspace = true }
dataknobs-data = { workspace = true }
dataknobs-utils = { workspace = true }
dataknobs-xization = { workspace = true }
dataknobs-fsm = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "pytest-benchmark>=4.0.0",
    "ruff>=0.8.0",
    "mypy>=1.0.0",
    "aioresponses>=0.7.8",
    # FastAPI + httpx power the reference registry-router tests
    # (test_registry_server.py).  FastAPI is an optional runtime
    # dependency — dataknobs_bots.registry.server lazy-imports it so
    # the package still imports cleanly when FastAPI is absent.
    # fastapi pinned to match the [server] extra's starlette CVE
    # floor (see the comment there); 0.110.0 capped starlette<0.37.0.
    "fastapi>=0.120.1",
    "starlette>=0.49.1",  # GHSA-7f5h-v6xp-fcq8 (CVSS 7.5), GHSA-2c2j-9gv5-cj73 (CVSS 5.3) fixed in 0.49.1
    "httpx>=0.27.0",
    # moto powers the S3 knowledge-backend region-fallback tests.
    # Declared in dataknobs-data's dev deps too, but the bots package
    # has its own S3 tests so it needs its own declaration to make
    # ``pytest packages/bots/tests`` work without depending on the
    # data package's dev group being installed.
    "moto>=5.1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_bots"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = []
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src/dataknobs_bots"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
warn_no_return = false
warn_unreachable = false
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "faiss.*",
    "chromadb.*",
]
ignore_missing_imports = true

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]

ignore = [
    "D100", # Missing docstring in public module
    "D101", # Missing docstring in public class
    "D102", # Missing docstring in public method
    "D103", # Missing docstring in public function
    "D104", # Missing docstring in public package
    "D105", # Missing docstring in magic method
    "D107", # Missing docstring in __init__
    "D203", # 1 blank line required before class docstring
    "D205", # 1 blank line required between summary line and description
    "D213", # Multi-line docstring summary should start at the second line
    "D400", # First line should end with a period
    "D401", # First line should be in imperative mood
    "D404", # First word of the docstring should not be "This"
    "B905", # zip() without an explicit strict parameter
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["D104", "F401"]
"tests/*" = ["D100", "D101", "D102", "D103", "S101"]

[tool.ruff.lint.isort]
known-first-party = [
    "dataknobs_bots",
    "dataknobs_common",
    "dataknobs_config",
    "dataknobs_llm",
    "dataknobs_data",
    "dataknobs_utils",
    "dataknobs_xization",
    "dataknobs_fsm"
]

[tool.ruff.lint.pydocstyle]
convention = "google"
