[project]
name = "dataknobs-xization"
version = "1.3.11"
description = "Text normalization and tokenization tools"
readme = "README.md"
authors = [
    { name = "Spence Koehler", email = "KoehlerSB747@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "dataknobs-common>=1.5.2",
    "dataknobs-structures>=1.0.12",
    "dataknobs-utils>=1.2.15",
    "beautifulsoup4>=4.12.0",
    "nltk>=3.9.4",  # GHSA-rf74-v2fm-23pw, CVE-2026-33230, CVE-2026-33231 fixed in 3.9.4. GHSA-p4gq-832x-fm9v and PYSEC-2026-597/CVE-2026-12243 (both CVSS 7.5, path traversal in nltk.data.find()/load() via percent-encoded (..%2f) traversal sequences that bypass the ../ regex check once url2pathname() decodes them) affect all versions through 3.9.4 with no upstream fix as of 2026-07-06 — accepted: this codebase loads only fixed corpus names (wordnet/omw-1.4/wordnet_ic) and never passes caller-controlled strings into nltk.data.find()
    "more-itertools>=8.10.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
]

[tool.uv.sources]
dataknobs-common = { workspace = true }
dataknobs-structures = { workspace = true }
dataknobs-utils = { workspace = true }

[dependency-groups]
dev = [
    # blockbuster powers the reproduce-first async-blocking assertions
    # (assert_no_blocking / requires_blockbuster from dataknobs-common)
    # used by the LocalDocumentSource async-offload tests. Without it
    # installed here those assertions would skip instead of proving the
    # ingest enumeration keeps the loop unblocked. Dev/test-only — never
    # imported by shipped runtime code.
    "blockbuster>=1.5.26,<2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_xization"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = []
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src/dataknobs_xization"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
warn_no_return = false
warn_unreachable = false
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "bs4.*",
    "pandas.*",
    "nltk.*",
    "lark.*",
]
ignore_missing_imports = true

# numpy >= 2.5 ships stubs using PEP 695 `type` statements (3.12+ syntax);
# with python_version = "3.10" mypy aborts on the present stub. Skip following
# into numpy's stubs (treat as Any) — we do not type-check against its API.
[[tool.mypy.overrides]]
module = "numpy.*"
ignore_missing_imports = true
follow_imports = "skip"
follow_imports_for_stubs = true

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
    "ASYNC",  # flake8-async - async code must not block the event loop
]

ignore = [
    "D100", # Missing docstring in public module
    "D101", # Missing docstring in public class
    "D102", # Missing docstring in public method
    "D103", # Missing docstring in public function
    "D104", # Missing docstring in public package
    "D105", # Missing docstring in magic method
    "D107", # Missing docstring in __init__
    "D203", # 1 blank line required before class docstring
    "D205", # 1 blank line required between summary line and description
    "D213", # Multi-line docstring summary should start at the second line
    "D400", # First line should end with a period
    "D401", # First line should be in imperative mood
    "D404", # First word of the docstring should not be "This"
    "B905", # zip() without an explicit strict parameter
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["D104", "F401"]
"tests/*" = ["D100", "D101", "D102", "D103", "S101"]

[tool.ruff.lint.isort]
known-first-party = ["dataknobs_xization", "dataknobs_common", "dataknobs_structures", "dataknobs_utils"]

[tool.ruff.lint.pydocstyle]
convention = "google"
