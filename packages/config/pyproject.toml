[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dataknobs-config"
version = "0.4.0"
description = "Modular configuration system with composable settings and environment variable overrides"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "KBS Labs", email = "info@kbs-labs.com"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pyyaml>=6.0.2",  # 6.0 lacks cp312/cp313 wheels and source build fails on Cython 3
    "dataknobs-common>=1.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=26.3.1",  # PYSEC-2024-48, GHSA-3936-cmfr-pm3m (CVSS 8.7) fixed by 26.3.1
    "flake8>=5.0",
    "mypy>=1.0",
    "types-PyYAML>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_config"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

# numpy >= 2.5 ships stubs using PEP 695 `type` statements (3.12+ syntax);
# with python_version = "3.10" mypy aborts on the present stub. Skip following
# into numpy's stubs (treat as Any) — we do not type-check against its API.
[[tool.mypy.overrides]]
module = "numpy.*"
ignore_missing_imports = true
follow_imports = "skip"
follow_imports_for_stubs = true

[tool.black]
line-length = 100
target-version = ['py310']

[tool.uv.sources]
dataknobs-common = { workspace = true }