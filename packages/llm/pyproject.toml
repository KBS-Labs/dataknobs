[project]
name = "dataknobs-llm"
version = "0.6.6"
description = "LLM utilities for DataKnobs"
readme = "README.md"
authors = [
    { name = "Spence Koehler", email = "KoehlerSB747@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "dataknobs-common>=1.6.0",
    "dataknobs-config>=0.4.2",
    "dataknobs-data>=0.6.0",
    "dataknobs-utils>=1.2.16",
    "pyyaml>=6.0.2",  # 6.0 lacks cp312/cp313 wheels and source build fails on Cython 3
    "jinja2>=3.1.6",  # GHSA-cpwx-vrp4-4pq7, GHSA-gmj6-6f8f-6699, GHSA-h75v-3vvj-5mfj, GHSA-q2x7-8rv6-6q7h fixed by 3.1.6
]

[project.optional-dependencies]
openai = [
    "openai>=1.0.0",
]
anthropic = [
    "anthropic>=0.18.0",
]
ollama = [
    "aiohttp>=3.14.1",  # extends the prior <=3.13.3 sweep (highest CVSS 9.1: GHSA-63hf-3vf5-4wqf) through 3.14.x. Adds GHSA-hg6j-4rv6-33pg (CVSS 6.6, per-request cookies= cross-origin leak), GHSA-jg22-mg44-37j8 (CVSS 6.4, CookieJar.load() deserialization), and the rest of the <3.14.x sweep landing across 3.14.0 / 3.14.1. The two named highs were triaged unreachable from this codebase (outbound HTTP uses header-based auth; CookieJar.load() is not invoked) but bumping clears the floor-resolve audit regardless. Unblocked by the workspace move off aioresponses to an in-process aiohttp.web test server.
]
huggingface = [
    "aiohttp>=3.14.1",  # extends the prior <=3.13.3 sweep (highest CVSS 9.1: GHSA-63hf-3vf5-4wqf) through 3.14.x. Adds GHSA-hg6j-4rv6-33pg (CVSS 6.6, per-request cookies= cross-origin leak), GHSA-jg22-mg44-37j8 (CVSS 6.4, CookieJar.load() deserialization), and the rest of the <3.14.x sweep landing across 3.14.0 / 3.14.1. The two named highs were triaged unreachable from this codebase (outbound HTTP uses header-based auth; CookieJar.load() is not invoked) but bumping clears the floor-resolve audit regardless. Unblocked by the workspace move off aioresponses to an in-process aiohttp.web test server.
]
embeddings = [
    "transformers>=5.5.0",  # GHSA-fgcw-684q-jj6r / CVE-2026-5241 (CVSS 8.0, arbitrary code execution during LightGlue model initialization) fixed in 5.5.0; extends the prior >=5.3.0 floor (GHSA-29pf-2h5f-8g72 CVSS 7.8) and >=5.0.0 floor (GHSA-69w3-r845-3855 CVSS 6.5) on top of 16 earlier CVEs (highest CVSS 9.0: PYSEC-2023-300)
    "torch>=2.13.0",  # PYSEC-2026-139 (CVSS 7.8, deserialization in pt2 Loading Handler) excluded by OSV last_affected=2.10.0; also keeps the prior sweep of PYSEC-2025-203/204/206 (fixed in 2.9.0), GHSA-887c-mr87-cxwp (CVSS 4.8, 2.8.0), GHSA-3749-ghw9-m3mg (CVSS 3.3, 2.7.1) and CVE-2025-32434 (RCE in torch.load, 2.6.0). Bumped 2.12.0 -> 2.13.0 to sweep the transitive setuptools floor: torch 2.12.0 pins setuptools<82 (floor-resolves to 81.0.0, vulnerable to PYSEC-2026-3447 / CVE-2026-59890 CVSS 6.1, MANIFEST.in glob path traversal), whereas torch>=2.13.0 requires setuptools>=77.0.3 with no upper cap, letting the floor resolve sweep setuptools to the fixed 83.0.0. GHSA-rrmf-rvhw-rf47 (CVSS 5.3, local memory corruption via torch.jit.script) affects all versions through 2.13.0 with no upstream fix — accepted: torch.jit.script is not called from this codebase (torch enters only via the transformers embeddings extra)
]
sqlite-cache = [
    "aiosqlite>=0.19.0",
]
# Amazon Bedrock provider (Converse chat + Titan/Cohere embeddings). The
# async bedrock-runtime transport is aioboto3, pulled via the shared
# ``dataknobs-common[aws]`` session-factory extra rather than re-pinning it
# here — single source of the aioboto3 version floor. aioboto3 is
# lazy-imported, so the base install never requires it.
bedrock = [
    "dataknobs-common[aws]",
]
all = [
    "dataknobs-llm[openai,anthropic,bedrock,ollama,huggingface,embeddings,sqlite-cache]",
]

[tool.uv.sources]
dataknobs-common = { workspace = true }
dataknobs-config = { workspace = true }
dataknobs-data = { workspace = true }
dataknobs-utils = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "pytest-benchmark>=4.0.0",
    "ruff>=0.8.0",
    "mypy>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_llm"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Disable pytest-benchmark during normal test runs; enable explicitly
# with --benchmark-enable or --benchmark-only
addopts = ["--benchmark-disable"]
asyncio_mode = "auto"
markers = [
    "integration: marks tests as integration tests (requires external services)",
    "ollama: marks tests as requiring Ollama LLM server",
    "bedrock: marks tests as requiring live Amazon Bedrock access",
    "slow: marks tests as slow running",
]

[tool.coverage.run]
source = ["src/dataknobs_llm"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
