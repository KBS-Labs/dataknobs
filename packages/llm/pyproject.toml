[project]
name = "dataknobs-llm"
version = "0.5.10"
description = "LLM utilities for DataKnobs"
readme = "README.md"
authors = [
    { name = "Spence Koehler", email = "KoehlerSB747@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "dataknobs-common>=1.3.11",
    "dataknobs-config>=0.3.11",
    "dataknobs-data>=0.4.16",
    "dataknobs-utils>=1.2.9",
    "pyyaml>=6.0",
    "jinja2>=3.1.6",  # GHSA-cpwx-vrp4-4pq7, GHSA-gmj6-6f8f-6699, GHSA-h75v-3vvj-5mfj, GHSA-q2x7-8rv6-6q7h fixed by 3.1.6
]

[project.optional-dependencies]
openai = [
    "openai>=1.0.0",
]
anthropic = [
    "anthropic>=0.18.0",
]
ollama = [
    "aiohttp>=3.13.4",  # multiple CVEs (highest CVSS 9.1: GHSA-63hf-3vf5-4wqf) fixed by 3.13.4
]
huggingface = [
    "aiohttp>=3.13.4",  # multiple CVEs (highest CVSS 9.1: GHSA-63hf-3vf5-4wqf) fixed by 3.13.4
]
embeddings = [
    "transformers>=4.53.0",  # 16 CVEs (highest CVSS 9.0: PYSEC-2023-300) fixed by 4.53.0
    "torch>=2.6.0",  # CVE-2025-32434 (RCE in torch.load) fixed in 2.6.0
]
sqlite-cache = [
    "aiosqlite>=0.19.0",
]
all = [
    "dataknobs-llm[openai,anthropic,ollama,huggingface,embeddings,sqlite-cache]",
]

[tool.uv.sources]
dataknobs-common = { workspace = true }
dataknobs-config = { workspace = true }
dataknobs-data = { workspace = true }
dataknobs-utils = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "pytest-benchmark>=4.0.0",
    "ruff>=0.8.0",
    "mypy>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_llm"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Disable pytest-benchmark during normal test runs; enable explicitly
# with --benchmark-enable or --benchmark-only
addopts = ["--benchmark-disable"]
asyncio_mode = "auto"
markers = [
    "integration: marks tests as integration tests (requires external services)",
    "ollama: marks tests as requiring Ollama LLM server",
    "slow: marks tests as slow running",
]

[tool.coverage.run]
source = ["src/dataknobs_llm"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
