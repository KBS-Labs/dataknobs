[project]
name = "dataknobs-utils"
version = "1.2.13"
description = "Utility functions for dataknobs packages"
readme = "README.md"
authors = [
    { name = "Spence Koehler", email = "KoehlerSB747@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "dataknobs-common>=1.4.0",
    "dataknobs-structures>=1.0.11",
    "pandas>=1.3.0",
    "requests>=2.33.0",  # PYSEC-2023-74, GHSA-9hjg-9r4m-mvj7, GHSA-9wx4-h78v-vm56, GHSA-gc5v-m9x4-r6x2 fixed by 2.33.0
    "psycopg2-binary>=2.9.10",  # 2.8.6/2.9.9 lack cp312/cp313 wheels; source build needs pg_config
    "lxml>=6.1.0",  # PYSEC-2020-62, PYSEC-2021-19, PYSEC-2021-852, PYSEC-2022-230, GHSA-vfmq-68hx-4jfw fixed by 6.1.0
    "beautifulsoup4>=4.9.0",
    "json-stream>=2.3.0",
    "python3-nmap>=1.5.0",
    "python-dotenv>=1.2.2",  # GHSA-mf9w-mj56-hr94 fixed in 1.2.2
    "nltk>=3.9.4",  # GHSA-rf74-v2fm-23pw, CVE-2026-33230, CVE-2026-33231 fixed in 3.9.4
]

[tool.uv.sources]
dataknobs-common = { workspace = true }
dataknobs-structures = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_utils"]
