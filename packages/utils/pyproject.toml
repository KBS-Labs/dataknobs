[project]
name = "dataknobs-utils"
version = "1.2.16"
description = "Utility functions for dataknobs packages"
readme = "README.md"
authors = [
    { name = "Spence Koehler", email = "KoehlerSB747@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "dataknobs-common>=1.6.0",
    "dataknobs-structures>=1.0.13",
    "pandas>=1.3.0",
    "requests>=2.33.0",  # PYSEC-2023-74, GHSA-9hjg-9r4m-mvj7, GHSA-9wx4-h78v-vm56, GHSA-gc5v-m9x4-r6x2 fixed by 2.33.0
    "psycopg2-binary>=2.9.10",  # 2.8.6/2.9.9 lack cp312/cp313 wheels; source build needs pg_config
    "lxml>=6.1.0",  # PYSEC-2020-62, PYSEC-2021-19, PYSEC-2021-852, PYSEC-2022-230, GHSA-vfmq-68hx-4jfw fixed by 6.1.0
    "beautifulsoup4>=4.9.0",
    "json-stream>=2.3.0",
    "python3-nmap>=1.5.0",
    "python-dotenv>=1.2.2",  # GHSA-mf9w-mj56-hr94 fixed in 1.2.2
    "nltk>=3.10.0",  # GHSA-p4gq-832x-fm9v / PYSEC-2026-2078 / CVE-2026-54293 (CVSS 7.5, path traversal in nltk.data.find()/load() via percent-encoded (..%2f) sequences that bypass the ../ regex check once url2pathname() decodes them) fixed in 3.10.0; also keeps GHSA-rf74-v2fm-23pw, CVE-2026-33230, CVE-2026-33231 (fixed in 3.9.4). PYSEC-2026-597/CVE-2026-12243 (CVSS 7.5, same path-traversal class) has no upstream fix as of 2026-07-14 — accepted: this codebase loads only fixed corpus names (wordnet/omw-1.4/wordnet_ic) and never passes caller-controlled strings into nltk.data.find()
]

[tool.uv.sources]
dataknobs-common = { workspace = true }
dataknobs-structures = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dataknobs_utils"]
