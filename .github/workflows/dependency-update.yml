name: Update Dependencies

# Consolidated weekly dependency update workflow.
#
# Triggers:
#   1. When a PR with the 'dependencies' label is opened (e.g., dependabot) —
#      merges it in, updates Python deps, creates a single combined PR.
#   2. Weekly Monday schedule — updates Python deps (and picks up any pending
#      'dependencies' PRs that haven't been processed yet).
#   3. Manual dispatch.
#
# Security alerts remain handled by Dependabot at the repo level
# (Settings > Code security and analysis) — independent of dependabot.yml.

on:
  pull_request:
    types: [opened, labeled]
  schedule:
    # Run weekly on Monday at 15:00 UTC (9 AM MDT / 8 AM MST)
    - cron: '0 15 * * 1'
  workflow_dispatch:

concurrency:
  group: dependency-updates
  cancel-in-progress: false

jobs:
  update-dependencies:
    # Run on schedule/dispatch always; on pull_request only for 'dependencies' label
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'dependencies')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Check for recent update
      id: debounce
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Skip if the update-dependencies branch was pushed within the last 2 hours
        last_updated=$(gh api "repos/${{ github.repository }}/branches/update-dependencies" \
          --jq '.commit.commit.committer.date' 2>/dev/null || echo "")

        if [ -n "$last_updated" ]; then
          last_epoch=$(date -d "$last_updated" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$last_updated" +%s 2>/dev/null || echo "0")
          now_epoch=$(date +%s)
          age_hours=$(( (now_epoch - last_epoch) / 3600 ))
          echo "update-dependencies branch last updated ${age_hours}h ago"
          if [ "$age_hours" -lt 2 ]; then
            echo "Skipping — updated less than 2 hours ago."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi
        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Merge pending dependency PRs
      if: steps.debounce.outputs.skip != 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Checking for open dependency PRs..."
        merged_any=false

        # Get all open dependency PRs (there may be more than one)
        branches=$(gh pr list \
          --label "dependencies" \
          --state open \
          --json headRefName \
          --jq '.[].headRefName')

        for branch in $branches; do
          echo "Merging dependency branch: ${branch}"
          git fetch origin "${branch}"
          git merge "origin/${branch}" --no-edit
          merged_any=true
        done

        echo "DEPENDABOT_MERGED=${merged_any}" >> "$GITHUB_ENV"

    - name: Close dependency PRs
      if: steps.debounce.outputs.skip != 'true' && env.DEPENDABOT_MERGED == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Closing dependency PRs (changes included in combined PR)..."
        gh pr list \
          --label "dependencies" \
          --state open \
          --json number \
          --jq '.[].number' | while read -r pr_number; do
            gh pr close "$pr_number" \
              --comment "Changes included in the consolidated weekly dependency update PR." \
              --delete-branch
          done

    - name: Install uv
      if: steps.debounce.outputs.skip != 'true'
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0

    - name: Update Python dependencies
      if: steps.debounce.outputs.skip != 'true'
      run: |
        uv lock --upgrade

    - name: Verify lock file resolves
      if: steps.debounce.outputs.skip != 'true'
      run: |
        uv sync --all-packages

    - name: Create Pull Request
      if: steps.debounce.outputs.skip != 'true'
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: 'chore: update dependencies'
        body: |
          Automated weekly dependency update.

          **Python dependencies:** Updated via `uv lock --upgrade`.
          **GitHub Actions:** ${{ env.DEPENDABOT_MERGED == 'true' && 'Included from dependency PR.' || 'No pending updates.' }}

          Lock file verified. Run `bin/dk pr --all` locally before merging.
        branch: update-dependencies
        delete-branch: true
