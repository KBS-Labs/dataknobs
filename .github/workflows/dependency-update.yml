name: Update Python Dependencies

# Weekly Python dependency update workflow.
#
# Triggers:
#   1. Weekly Monday schedule — upgrades Python deps and audits for CVEs.
#   2. Manual dispatch.
#
# GitHub Actions updates are handled by Dependabot directly (grouped
# into a single PR via dependabot.yml). This workflow only handles
# Python dependencies because pushing workflow file changes requires
# `workflows: write` permission, which we intentionally do not grant.
#
# After updating, osv-scanner audits the resolved lock file for known
# CVEs. Findings are included in the PR body so reviewers see them.
#
# Security alerts remain handled by Dependabot at the repo level
# (Settings > Code security and analysis) — independent of dependabot.yml.

on:
  schedule:
    # Run weekly on Monday at 15:00 UTC (9 AM MDT / 8 AM MST)
    - cron: '0 15 * * 1'
  workflow_dispatch:

concurrency:
  group: dependency-updates
  cancel-in-progress: false

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Check for recent update
      id: debounce
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Skip if the update-dependencies branch was pushed within the last 2 hours
        last_updated=$(gh api "repos/${{ github.repository }}/branches/update-dependencies" \
          --jq '.commit.commit.committer.date' 2>/dev/null || echo "")

        if [ -n "$last_updated" ]; then
          last_epoch=$(date -d "$last_updated" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$last_updated" +%s 2>/dev/null || echo "0")
          now_epoch=$(date +%s)
          age_hours=$(( (now_epoch - last_epoch) / 3600 ))
          echo "update-dependencies branch last updated ${age_hours}h ago"
          if [ "$age_hours" -lt 2 ]; then
            echo "Skipping — updated less than 2 hours ago."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi
        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Install uv
      if: steps.debounce.outputs.skip != 'true'
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

    - name: Update Python dependencies
      if: steps.debounce.outputs.skip != 'true'
      run: |
        uv lock --upgrade

    - name: Verify lock file resolves
      if: steps.debounce.outputs.skip != 'true'
      run: |
        uv sync --all-packages

    - name: Install osv-scanner
      if: steps.debounce.outputs.skip != 'true'
      env:
        OSV_SCANNER_VERSION: "2.3.3"
      run: |
        curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
          -o /usr/local/bin/osv-scanner
        chmod +x /usr/local/bin/osv-scanner
        osv-scanner --version

    - name: Audit dependencies for known vulnerabilities
      id: audit
      if: steps.debounce.outputs.skip != 'true'
      run: |
        # osv-scanner exits non-zero when vulnerabilities are found
        set +e
        output=$(osv-scanner scan --lockfile uv.lock --format table 2>&1)
        exit_code=$?
        set -e

        if [ "$exit_code" -eq 0 ]; then
          echo "vuln_summary=No known vulnerabilities found." >> "$GITHUB_OUTPUT"
        elif [ "$exit_code" -eq 1 ]; then
          # Exit code 1 = vulnerabilities found
          {
            echo "vuln_summary<<AUDIT_EOF"
            echo "**Known vulnerabilities detected — review before merging.**"
            echo ""
            echo '```'
            echo "$output"
            echo '```'
            echo "AUDIT_EOF"
          } >> "$GITHUB_OUTPUT"
        else
          # Exit code 2+ = scanner error (network failure, malformed lockfile, etc.)
          {
            echo "vuln_summary<<AUDIT_EOF"
            echo "**Vulnerability scan failed (exit code $exit_code) — check workflow logs.**"
            echo ""
            echo '```'
            echo "$output"
            echo '```'
            echo "AUDIT_EOF"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Create Pull Request
      if: steps.debounce.outputs.skip != 'true'
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Python dependencies'
        title: 'chore: update Python dependencies'
        body: |
          Automated weekly Python dependency update.

          **Python dependencies:** Updated via `uv lock --upgrade`.
          **Vulnerability audit:** ${{ steps.audit.outputs.vuln_summary }}

          Lock file verified. Run `bin/dk pr --all` locally before merging.
        branch: update-dependencies
        delete-branch: true
